<!DOCTYPE html>
<meta charset="utf-8">

<html>

<style type="text/css">
body {
	font-family: "Titillium Web", "HelveticaNeue-Light", "Helvetica Neue Light", "Helvetica Neue", Helvetica, Arial, "Lucida Grande", sans-serif;
	font-weight: 300;
	font-size: 17px;
	margin-left: auto;
	margin-right: auto;
	width: 980px;
}
h1 {
	font-weight:300;
	line-height: 1.15em;
}

h2 {
	font-size: 1.75em;
}
a:link,a:visited {
	color: #1367a7;
	text-decoration: none;
}
a:hover {
	color: #208799;
}
h1, h2, h3 {
	text-align: center;
}
h1 {
	font-size: 40px;
	font-weight: 500;
}
h2, h3 {
	font-weight: 400;
	margin: 16px 0px 4px 0px;
}
.paper-title {
	padding: 16px 0px 16px 0px;
}
section {
	margin: 32px 0px 32px 0px;
	text-align: justify;
	clear: both;
}
.col-5 {
	 width: 20%;
	 float: left;
}
.col-4 {
	 width: 25%;
	 float: left;
}
.col-3 {
    width: calc(100% / 4 - 20px);
    min-width: 180px;
	float: left;
    margin: 0 10px;
    box-sizing: border-box;
}
.col-2 {
	 width: 50%;
	 float: left;
}
.row, .author-row, .affil-row {
	 overflow: auto;
}
.author-row, .affil-row {
	font-size: 20px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.author-row .author-block {
    flex: 1 1 auto;
    max-width: 220px;
    min-width: 180px;
    text-align: center;
    margin: 10px 10px;
}
.author-row p {
	font-size: 16px;
	margin-top: 0px;
    margin-bottom: 5px;
}
.row {
	margin: 16px 0px 16px 0px;
}
.authors {
	font-size: 18px;
}
.affil-row {
	margin-top: 16px;
    font-size: 16px;
}
.teaser {
	max-width: 100%;
}
.text-center {
	text-align: center;
}
.screenshot {
	width: 256px;
	border: 1px solid #ddd;
}
.screenshot-el {
	margin-bottom: 16px;
}
hr {
	height: 1px;
	border: 0;
	border-top: 1px solid #ddd;
	margin: 0;
}
.material-icons {
	vertical-align: -6px;
}
p {
	line-height: 1.25em;
}
.caption_justify {
	font-size: 16px;
	color: #666;
	text-align: justify;
	margin-top: 8px;
	margin-bottom: 16px;
}
.caption {
	font-size: 16px;
	color: #666;
	text-align: center;
	margin-top: 8px;
	margin-bottom: 5px;
}
.caption_inline {
	font-size: 16px;
	color: #666;
	text-align: center;
	margin-top: 8px;
	margin-bottom: 0px;
}
.caption_bold {
	font-size: 16px;
	color: #666;
	text-align: center;
	margin-top: 0px;
	margin-bottom: 0px;
	font-weight: bold;
}
video {
	display: block;
	margin: auto;
    border: 1px solid #ddd;
	max-width: 100%;
}
figure {
	display: block;
	margin: auto;
	margin-top: 10px;
	margin-bottom: 20px;
}
.blue {
	color: #2c82c9;
	font-weight: bold;
}
.orange {
	color: #d35400;
	font-weight: bold;
}
.flex-row {
	display: flex;
	flex-flow: row wrap;
	justify-content: space-around;
	padding: 0;
	margin: 0;
	list-style: none;
}
.paper-btn {
  position: relative;
  text-align: center;
  display: inline-block;
  margin: 8px;
  padding: 8px 18px;
  border-width: 0;
  outline: none;
  border-radius: 2px;
  background-color: #1367a7;
  color: #ecf0f1 !important;
  font-size: 20px;
  width: auto;
  height: auto;
  font-weight: 600;
  transition: background-color 0.3s ease;
}
.paper-btn-parent {
	display: flex;
	justify-content: center;
	margin: 16px 0px;
    flex-wrap: wrap;
}
.paper-btn:hover {
	background-color: #208799;
    opacity: 1;
}
.container {
	margin-left: auto;
	margin-right: auto;
	padding-left: 16px;
	padding-right: 16px;
}
.venue {
	color: #6c6c6c;
	font-size: 18px;
    margin-top: 10px;
    margin-bottom: 20px;
}
.center {
    display: block;
    margin-left: auto;
    margin-right: auto;
}
img.responsive-img {
    max-width: 100%;
    height: auto;
    border: 1px solid #ddd;
    margin-top: 10px;
    margin-bottom: 5px;
}
.figure-group {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
}
.figure-group .figure-item {
    flex-basis: calc(50% - 20px);
    margin: 10px;
    text-align: center;
}
.figure-item img {
    max-width: 100%;
    height: auto;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin: 20px 0;
}
table th, table td {
    border: 1px solid #ddd;
    padding: 12px;
    text-align: left;
}
table th {
    background-color: #f2f2f2;
    font-weight: 600;
    text-align: center;
}
table td {
    text-align: center;
}
ul, ol {
    line-height: 1.6em;
}
li {
    margin: 8px 0;
}

</style>
<link href='https://fonts.googleapis.com/css?family=Titillium+Web:400,600,400italic,600italic,300,300italic' rel='stylesheet' type='text/css'>

	<link rel="icon" href="data:,">
</head>

<div class="container">
	<div class="paper-title">
		<h1>repo766</h1>
	</div>
</div>

</body>
</html>
